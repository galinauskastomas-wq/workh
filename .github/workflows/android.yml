name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld cython3 virtualenv openjdk-17-jdk unzip wget

    - name: Setup Android SDK and Aidl
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        wget https://google.com -O tools.zip
        unzip tools.zip && rm tools.zip
        mv cmdline-tools latest
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"
        # Sukuriame nuorodą į aidl, kad Buildozer ją garantuotai matytų
        sudo ln -s $ANDROID_HOME/build-tools/34.0.0/aidl /usr/local/bin/aidl

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer

    - name: Build with Buildozer
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        YES=1 buildozer -v android debug
      env:
        ACCEPT_SDK_LICENSE_NET: "y"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4.4.3
      with:
        name: WorkHoursApp-APK
        path: bin/*.apk
