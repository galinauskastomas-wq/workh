name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    # Pridedame aplinkos kintamąjį, kad GitHub priverstinai leistų kompiliuoti kodą naujoje aplinkoje
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lldd cython3 virtualenv
        python -m pip install --upgrade pip
        pip install buildozer

    - name: Build with Buildozer
      run: |
        YES=1 buildozer -v android debug
      env:
        ACCEPT_SDK_LICENSE_NET: "y"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WorkHoursApp-APK
        path: bin/*.apk
